name: Gerar APK do Jogo

on:
  push:
    branches: [ main ] # Roda sempre que você atualiza o código

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20

    - name: Instalar Capacitor e Criar Projeto Android
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Meu Jogo de Caminhao" "com.meujogo.caminhao" --web-dir=.
        npx cap add android

    - name: Configurar o Java (necessário para Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Compilar o APK
      run: |
        npx cap sync
        cd android && ./gradlew assembleDebug

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: Jogo-Caminhao-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
